<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>우리동네 안전지도</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    :root {
      --primary:#1759d1;
      --primary-dark:#0d3f9c;
      --sky:#eaf3ff;
      --ink:#14213d;
      --muted:#65758b;
      --line:#dbe6f3;
      --panel:#ffffff;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin:0; height:100%; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR','Malgun Gothic',sans-serif; color:var(--ink); background:#f6f9fe; }
    body { overflow:hidden; }
    .screen { position:fixed; inset:0; display:none; background:linear-gradient(180deg,#f4f9ff 0%,#ffffff 58%,#e9f3ff 100%); }
    .screen.active { display:flex; }

    /* Splash */
    #splash { align-items:center; justify-content:center; padding:28px; text-align:center; }
    .splash-card { width:min(92vw,520px); min-height:72vh; border-radius:34px; background:rgba(255,255,255,.88); border:1px solid rgba(210,224,242,.9); box-shadow:0 22px 60px rgba(23,89,209,.14); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:42px 28px; }
    .brand-row { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:28px; }
    .brand-text { font-size:1.12rem; font-weight:850; color:#12336f; letter-spacing:-.04em; }
    .emblem-wrap { width:62px; height:62px; border-radius:50%; background:linear-gradient(145deg,#eaf3ff,#ffffff); border:1px solid #dbe6f3; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .emblem-wrap img { width:48px; height:48px; object-fit:contain; display:none; }
    .emblem-placeholder { width:46px; height:46px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; color:white; font-weight:800; letter-spacing:-.04em; font-size:.68rem; }
    .splash-title { margin:0; }
    .title-badge { display:inline-flex; flex-direction:column; align-items:center; gap:8px; padding:18px 24px 20px; border-radius:28px; background:linear-gradient(180deg,#ffffff 0%,#f1f7ff 100%); border:1px solid #d7e6fb; box-shadow:0 14px 34px rgba(23,89,209,.13); }
    .title-kicker { display:inline-flex; align-items:center; justify-content:center; padding:5px 13px; border-radius:999px; background:#eaf3ff; color:#1759d1; font-size:clamp(.86rem,3vw,1rem); font-weight:900; letter-spacing:-.04em; }
    .title-main { font-size:clamp(2.1rem,8vw,3.2rem); line-height:1; letter-spacing:-.08em; font-weight:950; color:#0f2d63; }
    .splash-title .title-safe { color:#1759d1; }
    .splash-title .title-map { color:#e53935; }
    .splash-subtitle { margin:18px 0 0; font-size:clamp(1rem,3.6vw,1.15rem); line-height:1.55; color:#40546f; word-break:keep-all; }
    .trial-note { margin:10px 0 0; color:#6f7f95; font-size:.82rem; line-height:1.35; }
    .progress { width:160px; height:4px; border-radius:999px; background:#dbe8fb; margin-top:34px; overflow:hidden; }
    .progress > span { display:block; width:0; height:100%; background:var(--primary); border-radius:999px; animation:load 7s linear forwards; }
    @keyframes load { to { width:100%; } }

    /* Menu */
    #menu { align-items:center; justify-content:center; padding:24px; flex-direction:column; }
    .menu-card { width:min(92vw,520px); border-radius:32px; background:white; border:1px solid var(--line); box-shadow:0 22px 60px rgba(23,89,209,.12); padding:28px 22px 24px; }
    .menu-head { text-align:center; margin-bottom:22px; }
    .menu-head h2 { margin:0; font-size:1.52rem; letter-spacing:-.05em; }
    .menu-head p { margin:8px 0 0; color:var(--muted); line-height:1.45; font-size:.95rem; }
    .choice-grid { display:grid; gap:14px; }
    .choice { width:100%; border:0; border-radius:24px; padding:22px 18px; display:flex; align-items:center; gap:16px; text-align:left; cursor:pointer; font-weight:800; font-size:1.18rem; letter-spacing:-.04em; box-shadow:0 10px 24px rgba(28,64,120,.08); }
    .choice small { display:block; margin-top:5px; font-weight:500; font-size:.85rem; letter-spacing:-.02em; opacity:.82; }
    .choice.call { background:linear-gradient(135deg,#ff4b4b,#c51f31); color:white; }
    .choice.map { background:linear-gradient(135deg,#1f78ff,#1746b7); color:white; }
    .choice.civil { background:linear-gradient(135deg,#5f6f89,#2f405a); color:white; }
    .choice-icon { flex:0 0 52px; width:52px; height:52px; border-radius:18px; background:rgba(255,255,255,.22); display:flex; align-items:center; justify-content:center; font-size:1.8rem; }
    .menu-note { margin-top:18px; padding:12px 14px; border-radius:18px; background:#f3f7fc; color:#53657b; line-height:1.45; font-size:.86rem; text-align:center; }
    .menu-footer { width:min(92vw,520px); margin-top:14px; text-align:center; color:#28466f; }
    .footer-slogan { font-weight:900; font-size:1.03rem; letter-spacing:-.04em; }
    .slogan-emergency { color:#e53935; font-weight:950; }
    .slogan-map { color:#1759d1; font-weight:950; }
    .footer-contact { margin-top:7px; font-size:.83rem; color:#607187; line-height:1.45; }

    /* Map screen */
    #mapScreen { background:#f4f7fb; flex-direction:column; }
    .map-top { flex:0 0 auto; padding:12px 12px 10px; background:rgba(255,255,255,.96); border-bottom:1px solid var(--line); box-shadow:0 6px 20px rgba(20,45,90,.06); z-index:1000; }
    .top-title-row { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:10px; }
    .mini-brand { display:flex; align-items:center; justify-content:center; gap:8px; min-width:0; width:100%; }
    .mini-emblem { width:30px; height:30px; flex:0 0 30px; border-radius:50%; background:#eef4ff; border:1px solid #dbe6f3; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .mini-emblem img { width:25px; height:25px; object-fit:contain; display:none; }
    .mini-emblem span { width:24px; height:24px; border-radius:50%; background:var(--primary); color:white; display:flex; align-items:center; justify-content:center; font-size:.43rem; font-weight:900; letter-spacing:-.05em; }
    .mini-title { font-weight:850; letter-spacing:-.05em; color:#0f2d63; font-size:1.1rem; white-space:nowrap; }
    .top-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; width:100%; margin-bottom:10px; }
    .top-btn { border:0; border-radius:999px; padding:11px 13px; background:var(--primary); color:white; font-weight:800; cursor:pointer; font-size:.92rem; white-space:nowrap; width:100%; }
    .top-btn.secondary { background:#eef4ff; color:#184caa; }
    .guide { background:#f7fbff; border:1px solid var(--line); border-radius:18px; padding:10px 12px; color:#41546f; font-size:.86rem; line-height:1.45; text-align:center; }
    .guide p { margin:0; }
    .guide p + p { margin-top:4px; }
    .type-panel { margin-top:8px; display:flex; flex-wrap:wrap; gap:5px; align-items:center; }
    .chip { flex:0 0 auto; border:1px solid var(--line); background:white; color:#344963; border-radius:999px; padding:5px 7px; display:flex; align-items:center; gap:4px; font-size:.69rem; font-weight:800; cursor:pointer; white-space:nowrap; line-height:1; }
    .chip input { display:none; }
    .chip.off { opacity:.38; filter:grayscale(1); }
    .chip .chip-icon { width:20px; height:20px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:.86rem; color:white; }
    .sos-icon { display:inline-flex; align-items:center; justify-content:center; background:linear-gradient(180deg,#ff5a4f 0%,#d21e1e 100%); color:#fff; font-weight:900; letter-spacing:-.04em; box-shadow:inset 0 2px 0 rgba(255,255,255,.35), inset 0 -2px 0 rgba(0,0,0,.12), 0 1px 3px rgba(0,0,0,.2); }
    .chip-icon .sos-icon { width:18px; height:18px; border-radius:50%; font-size:.5rem; line-height:1; }
    .pin > span .sos-icon { width:24px; height:24px; border-radius:50%; font-size:.62rem; line-height:1; }
    .map-area { position:relative; flex:1 1 auto; min-height:0; }
    #map { width:100%; height:100%; }
    .floating-count { position:absolute; left:12px; bottom:calc(16px + var(--safe-bottom)); z-index:900; background:rgba(255,255,255,.96); border:1px solid var(--line); border-radius:999px; padding:10px 14px; font-size:.88rem; color:#40546f; box-shadow:0 8px 22px rgba(16,42,78,.12); }
    .locating { position:absolute; left:50%; top:18px; transform:translateX(-50%); z-index:950; background:#14213d; color:white; border-radius:999px; padding:10px 14px; font-size:.86rem; display:none; box-shadow:0 8px 20px rgba(0,0,0,.18); }
    .legend-toast { position:absolute; left:50%; top:68px; transform:translateX(-50%); z-index:960; width:min(88vw,420px); background:rgba(20,33,61,.94); color:white; border-radius:18px; padding:13px 16px; font-size:.9rem; line-height:1.45; text-align:center; display:none; box-shadow:0 10px 28px rgba(0,0,0,.22); word-break:keep-all; }
    .map-entry-notice { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:970; width:min(84vw,390px); background:rgba(20,33,61,.95); color:white; border-radius:22px; padding:20px 18px; font-size:1rem; line-height:1.5; text-align:center; display:none; box-shadow:0 16px 38px rgba(0,0,0,.25); word-break:keep-all; }
    .map-entry-notice b { display:block; margin-bottom:6px; font-size:1.06rem; }

    .custom-marker { width:34px; height:42px; transform:translate(-17px,-42px); }
    .pin { width:36px; height:36px; border-radius:50%; border:3px solid white; box-shadow:0 5px 14px rgba(0,0,0,.28); display:flex; align-items:center; justify-content:center; }
    .pin > span { color:white; font-size:19px; line-height:1; filter:drop-shadow(0 1px 1px rgba(0,0,0,.25)); }
    .dup-ring .pin { outline:2px solid rgba(255,195,0,.9); }
    .user-marker { width:22px; height:22px; border-radius:50%; background:#1f78ff; border:4px solid white; box-shadow:0 0 0 8px rgba(31,120,255,.18), 0 5px 16px rgba(31,120,255,.35); }
    .leaflet-popup-content-wrapper { border-radius:18px; }
    .leaflet-popup-content { margin:14px 16px; }
    .popup-title { font-weight:850; color:#0f2d63; font-size:1rem; margin-bottom:7px; letter-spacing:-.03em; }
    .popup-type { display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:5px 9px; color:white; font-size:.78rem; font-weight:800; margin-bottom:8px; }
    .popup-row { margin-top:5px; font-size:.87rem; line-height:1.42; color:#40546f; }
    .popup-row b { color:#1a2f4f; }
    .popup-note { margin-top:9px; padding:8px; border-radius:10px; background:#fff4db; color:#7d5513; font-size:.8rem; line-height:1.35; }
    .popup-actions { display:grid; gap:7px; margin-top:11px; }
    .popup-link { display:block; text-align:center; text-decoration:none; border-radius:12px; padding:9px 10px; font-size:.84rem; font-weight:850; color:white !important; background:#1759d1; }

    @media (min-width: 900px) {
      .map-top { position:absolute; left:18px; top:18px; width:420px; border:1px solid var(--line); border-radius:24px; padding:16px; }
      #mapScreen { display:none; }
      #mapScreen.active { display:block; }
      .map-area { height:100vh; }
      .top-title-row { margin-bottom:12px; }
    }
  </style>
</head>
<body>
  <section id="splash" class="screen active" aria-label="시작 화면">
    <div class="splash-card">
      <div class="brand-row">
        <div class="emblem-wrap">
          <img id="policeEmblemSplash" alt="경찰 마크" />
          <div class="emblem-placeholder" id="emblemPlaceholderSplash">POLICE</div>
        </div>
        <div class="brand-text">대전서부경찰서</div>
      </div>
      <h1 class="splash-title"><span class="title-badge"><span class="title-kicker">우리 동네</span><span class="title-main"><span class="title-safe">안전</span><span class="title-map"> 지도</span></span></span></h1>
      <p class="splash-subtitle">내 주변의 도움 장소를 안내합니다.</p>
      <div class="progress" aria-hidden="true"><span></span></div>
      <p class="trial-note">※ 현재 시범 운영 중입니다 ※</p>
    </div>
  </section>

  <section id="menu" class="screen" aria-label="선택 화면">
    <div class="menu-card">
      <div class="menu-head">
        <h2>원하는 기능을 선택하세요.</h2>
      </div>
      <div class="choice-grid">
        <button class="choice map" id="showMapBtn">
          <span class="choice-icon">🛡</span>
          <span>안심지도 보기<small>내 주변의 도움 장소를 확인합니다.</small></span>
        </button>
        <button class="choice call" id="call112Btn">
          <span class="choice-icon">☎</span>
          <span>긴급신고 112<small>신고 전화로 연결됩니다.</small></span>
        </button>
        <button class="choice civil" id="call182Btn">
          <span class="choice-icon">☏</span>
          <span>민원상담 182<small>상담 전화로 연결됩니다.</small></span>
        </button>
      </div>
      <div class="menu-note">정보 제공용으로 절대적 안전을 보장하지는 않습니다.</div>
    </div>
    <div class="menu-footer">
      <div class="footer-slogan"><strong class="slogan-emergency">위급할 땐 112</strong><span>, </span><strong class="slogan-map">평소엔 안심지도</strong></div>
      <div class="footer-contact">제작 : 대전서부경찰서 범죄예방계<br>(☎ 042)600-3545)</div>
    </div>
  </section>

  <section id="mapScreen" class="screen" aria-label="안심지도 화면">
    <div class="map-top">
      <div class="top-title-row">
        <div class="mini-brand"><div class="mini-emblem"><img id="policeEmblemMap" alt="경찰 마크" /><span id="emblemPlaceholderMap">POLICE</span></div><div class="mini-title">대전서부경찰서 안심지도</div></div>
      </div>
      <div class="top-actions">
        <button class="top-btn" id="locateBtn">내 위치 보기</button>
        <button class="top-btn secondary" id="backBtn">뒤로가기</button>
      </div>
      <div class="guide">
        <p>아래에서 지도에 표시할 안전거점을 선택하세요.</p>
      </div>
      <div class="type-panel" id="typePanel" aria-label="거점유형 선택"></div>
    </div>
    <div class="map-area">
      <div id="map"></div>
      <div class="locating" id="locatingToast">현재 위치를 확인하고 있습니다.</div>
      <div class="legend-toast" id="legendToast" role="status" aria-live="polite"></div>
      <div class="map-entry-notice" id="mapEntryNotice" role="status" aria-live="polite"><b>안내</b>표시된 위치가 실제 위치와 일부 차이가 있을 수 있습니다.</div>
      <div class="floating-count" id="countBadge">표시 거점 0건</div>
    </div>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    const DATA = (window.SAFETY_DATA || []).filter(d => d && d.lat && d.lng);

    const types = Array.from(new Set(DATA.map(d => d.type).filter(Boolean))).sort((a,b) => {
      const ai = TYPE_ORDER.indexOf(a), bi = TYPE_ORDER.indexOf(b);
      if (ai !== -1 || bi !== -1) return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
      return a.localeCompare(b,'ko');

    const selectedTypes = new Set();
    let map, markerLayer, userMarker;

    function showScreen(name) {
      Object.values(screens).forEach(s => s.classList.remove('active'));

      if (name === 'mapScreen') {
        setTimeout(() => { initMap(); map.invalidateSize(); map.fitBounds(seoGuBounds); }, 80);

    function loadPoliceEmblem() {
      const candidates = ['police_emblem.png','police_emblem.jpg','police_emblem.jpeg','police_emblem.webp','police_emblem.svg','police_emblem'];
      const targets = [
        { img: document.getElementById('policeEmblemSplash'), placeholder: document.getElementById('emblemPlaceholderSplash') },
        { img: document.getElementById('policeEmblemMap'), placeholder: document.getElementById('emblemPlaceholderMap') }
      ].filter(t => t.img && t.placeholder);

      targets.forEach(({ img, placeholder }) => {
        let i = 0;
        function tryNext() {
          if (i >= candidates.length) {
            img.style.display = 'none';
            placeholder.style.display = 'flex';
            return;
          }
          img.src = candidates[i++];
        }
        img.onload = () => { img.style.display = 'block'; placeholder.style.display = 'none'; };
        img.onerror = tryNext;
        tryNext();
      });
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]));
    }

    function naverMapUrl(item) {
      const name = encodeURIComponent(item.address || item.name || '안전거점');
      return `https://map.naver.com/p/search/${name}?c=${item.lng},${item.lat},17,0,0,0,dh`;
    }

    function notifyNaverMove() {
      alert('네이버 지도로 해당 지점 주변을 확인합니다.');
      return true;
    }

    function getIconMarkup(style, mode = 'marker') {
      if (style && style.iconType === 'sos') {
        return `<span class="sos-icon">SOS</span>`;
      }
      return escapeHtml(style?.icon || '📍');
    }

    function showLegendToast(type) {
      const toast = document.getElementById('legendToast');
      if (!toast) return;
      const style = TYPE_STYLE[type] || TYPE_STYLE['기타'];
      const label = style.label || type;
      const desc = TYPE_DESC[type] || '지도에 표시할 안전거점을 선택했습니다.';
      toast.innerHTML = `<b>${escapeHtml(label)}</b><br>${escapeHtml(desc)}`;
      toast.style.display = 'block';
      clearTimeout(showLegendToast.timer);
      showLegendToast.timer = setTimeout(() => { toast.style.display = 'none'; }, 5000);
    }

    function showMapEntryNotice() {
      const notice = document.getElementById('mapEntryNotice');
      if (!notice) return;
      notice.style.display = 'block';
      clearTimeout(showMapEntryNotice.timer);
      showMapEntryNotice.timer = setTimeout(() => { notice.style.display = 'none'; }, 5000);
    }

    function makeMarkerIcon(item) {
      const style = TYPE_STYLE[item.type] || TYPE_STYLE['기타'];
      const safeIcon = getIconMarkup(style, 'marker');
      const dupClass = item.dupCount > 1 ? ' dup-ring' : '';
      const pinBg = style.iconType === 'sos' ? '#ffffff' : style.color;
      return L.divIcon({
        className: 'custom-marker' + dupClass,
        html: `<div class="pin" style="background:${pinBg}"><span>${safeIcon}</span></div>`,
        iconSize: [36,36],
        iconAnchor: [18,18],
        popupAnchor: [0,-22]
      });
    }

    function popupHtml(item) {
      const style = TYPE_STYLE[item.type] || TYPE_STYLE['기타'];
      const typeLabel = style.label || item.type || '안전거점';
      const title = item.type === 'CCTV/IP비상벨' ? 'CCTV 비상벨' : (item.name || typeLabel);
      const mapUrl = naverMapUrl(item);
      return `
        <div class="popup-title">${escapeHtml(title)}</div>
        <div class="popup-type" style="background:${style.color}">${escapeHtml(typeLabel)}</div>
        <div class="popup-row"><b>주소</b> · ${escapeHtml(item.address || '-')}</div>
        ${item.detail ? `<div class="popup-row"><b>상세위치</b> · ${escapeHtml(item.detail)}</div>` : ''}
        ${item.adminDong ? `<div class="popup-row"><b>행정동</b> · ${escapeHtml(item.adminDong)}</div>` : ''}
        ${item.policeArea ? `<div class="popup-row"><b>관할</b> · ${escapeHtml(item.policeArea)}</div>` : ''}
        ${item.dupCount > 1 ? `<div class="popup-note">같은 좌표 내 여러 거점을 약간 벌려 표시했습니다.</div>` : ''}
        <div class="popup-actions">
          <a class="popup-link" href="${mapUrl}" target="_blank" rel="noopener" onclick="return notifyNaverMove()">네이버 지도에서 보기</a>
        </div>
      `;
    }

    function buildTypePanel() {
      const panel = document.getElementById('typePanel');
      panel.innerHTML = '';
      types.forEach(type => {
        const style = TYPE_STYLE[type] || TYPE_STYLE['기타'];
        const chip = document.createElement('label');
        chip.className = 'chip off';
        const chipBg = style.iconType === 'sos' ? '#ffffff' : style.color;
        chip.innerHTML = `<input type="checkbox" value="${escapeHtml(type)}"><span class="chip-icon" style="background:${chipBg}">${getIconMarkup(style, 'chip')}</span>${style.label || type}`;
        chip.querySelector('input').addEventListener('change', (e) => {
          if (e.target.checked) {
            selectedTypes.add(type);
            chip.classList.remove('off');
            showLegendToast(type);
          } else {
            selectedTypes.delete(type);
            chip.classList.add('off');
          }
          renderMarkers();
        });
        panel.appendChild(chip);
      });
    }



    function applyDuplicateOffsets(items) {
      const groups = new Map();
      items.forEach(item => {
        const key = `${Number(item.lat).toFixed(7)},${Number(item.lng).toFixed(7)}`;
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(item);
      });
      groups.forEach(group => {
        if (group.length === 1) {
          group[0].displayLat = group[0].lat;
          group[0].displayLng = group[0].lng;
          return;
        }
        const radius = 0.000055;
        group.forEach((item, idx) => {
          const angle = (Math.PI * 2 * idx) / group.length;
          item.displayLat = item.lat + Math.sin(angle) * radius;
          item.displayLng = item.lng + Math.cos(angle) * radius;
        });
      });
    }

    function initMap() {
      if (map) return;
      if (typeof L === 'undefined') { alert('지도 라이브러리를 불러오지 못했습니다. 인터넷 연결 또는 기관망 차단 여부를 확인해주세요.'); return; }
      map = L.map('map', { preferCanvas:true, zoomControl:true, maxBounds:seoGuBounds, maxBoundsViscosity:.72 }).setView(seoGuCenter, 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19, attribution:'&copy; OpenStreetMap contributors' }).addTo(map);
      markerLayer = L.layerGroup().addTo(map);
      buildTypePanel();
      renderMarkers();
      map.fitBounds(seoGuBounds);
    }

    function renderMarkers() {
      if (!markerLayer) return;
      markerLayer.clearLayers();
      const filtered = DATA.filter(d => selectedTypes.has(d.type));
      filtered.forEach(item => {
        L.marker([item.displayLat || item.lat, item.displayLng || item.lng], { icon: makeMarkerIcon(item) })
          .bindPopup(popupHtml(item), { maxWidth:320 })
          .addTo(markerLayer);
      });
      document.getElementById('countBadge').textContent = `표시 거점 ${filtered.length.toLocaleString()}건`;
    }

    function locateUser() {
      if (!navigator.geolocation) { alert('이 기기에서는 위치 기능을 사용할 수 없습니다.'); return; }
      const toast = document.getElementById('locatingToast');
      toast.style.display = 'block';
      navigator.geolocation.getCurrentPosition(pos => {
        toast.style.display = 'none';
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        const accuracy = Math.round(pos.coords.accuracy || 0);
        if (userMarker) userMarker.remove();
        const icon = L.divIcon({ className:'', html:'<div class="user-marker"></div>', iconSize:[22,22], iconAnchor:[11,11] });
        userMarker = L.marker([lat,lng], { icon }).addTo(map).bindPopup(`현재 위치<br><span style="color:#65758b;font-size:.85rem;">오차범위 약 ${accuracy}m</span>`).openPopup();
        map.setView([lat,lng], 17, { animate:true });
      }, err => {
        toast.style.display = 'none';
        let msg = '현재 위치를 확인하지 못했습니다.';
        if (err.code === 1) msg = '위치 권한이 허용되지 않았습니다. 브라우저 위치 권한을 허용해주세요.';
        else if (err.code === 2) msg = '기기에서 현재 위치를 찾지 못했습니다.';
        else if (err.code === 3) msg = '위치 확인 시간이 초과되었습니다.';
        alert(msg);
      }, { enableHighAccuracy:true, timeout:10000, maximumAge:30000 });
    }

    document.getElementById('call112Btn').addEventListener('click', () => { window.location.href = 'tel:112'; });
    document.getElementById('call182Btn').addEventListener('click', () => { window.location.href = 'tel:182'; });
    document.getElementById('showMapBtn').addEventListener('click', () => {
      showScreen('mapScreen');
      setTimeout(showMapEntryNotice, 180);
    });
    document.getElementById('locateBtn').addEventListener('click', locateUser);
    document.getElementById('backBtn').addEventListener('click', () => showScreen('menu'));

    loadPoliceEmblem();
    setTimeout(() => showScreen('menu'), 7000);
  </script>
</body>
</html>
